<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instalación de conectores</title>
  <link rel="stylesheet" href="conectores.css">
</head>
<body>

<canvas id="c"></canvas>

<a id="back-btn" href="/index.html">← MENÚ</a>

<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- HUD de controles -->
<div style="position: fixed; top: 80px; left: 16px; z-index: 100; background: rgba(4,8,15,0.88); border: 1px solid var(--border); border-radius: 4px; padding: 14px 18px; backdrop-filter: blur(6px); font-family: 'Share Tech Mono', monospace; font-size: 10px; line-height: 1.8; color: var(--dim);">
  <div style="color: var(--blue); font-weight: bold; margin-bottom: 6px; letter-spacing: 2px;">CONTROLES</div>
  <div><span style="color: var(--accent);">CLICK</span> → Bloquear mouse</div>
  <div><span style="color: var(--accent);">MOUSE</span> → Mirar</div>
  <div><span style="color: var(--green);">WASD</span> → Mover jugador</div>
  <div><span style="color: var(--text); font-weight: bold;">ESPACIO</span> → Saltar</div>
  <div><span style="color: var(--dim);">Shift/Ctrl</span> → Volar arriba/abajo (noclip)</div>
  <div><span style="color: var(--blue);">IJKL</span> → Mano izq. (U/O arriba/abajo)</div>
  <div><span style="color: var(--accent2);">FLECHAS</span> → Mano der. (PgUp/PgDn arriba/abajo)</div>
  <div><span style="color: var(--green);">E</span> → Interactuar con herramientas</div>
</div>

<script type="module" src="conectores.js"></script>
</body>
</html>
